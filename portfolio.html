<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Frames | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">PHOTOGRAPHY | STUDIOS</div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="studios.html">STUDIOS</a>
            <a href="portfolio.html" class="active">PORTFOLIO</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <button id="theme-toggle" class="theme-toggle">
        <span class="icon">☀️</span> <span id="theme-text">Light Mode</span>
    </button>

    <main>
        <section id="portfolio" class="about-section" style="min-height: 80vh; background: transparent;">
            <div style="text-align: center; width: 100%;">
                <h2 style="font-size: 3rem; margin-bottom: 2rem; color: var(--accent-color);">Portfolio</h2>
                <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
                     <img src="images/fashion_portrait.webp" alt="Fashion" style="width: 300px; height: 300px; object-fit: cover; border-radius: 4px;">
                     <img src="images/nature_portrait.webp" alt="Nature" style="width: 300px; height: 300px; object-fit: cover; border-radius: 4px;">
                     <img src="images/group_models.webp" alt="Group" style="width: 300px; height: 300px; object-fit: cover; border-radius: 4px;">
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
